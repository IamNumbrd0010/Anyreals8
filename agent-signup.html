<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="navbar">

    <div class="logo">
      Anyreals
    </div>
  
    <div class="menu-toggle" id="menuToggle">
      ☰
    </div>
  
    <nav id="navMenu">
  
      <a href="index.html">Home</a>
  
      <a href="properties.html">
        Properties
      </a>
  
      <a href="property-services.html">
        Property Services
      </a>
  
      <div id="navAuth"></div>
  
    </nav>
  
  </header>

<section class="section">
  <h2>Register as Agent</h2>

  <form id="agentForm" class="service-form">

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="business" placeholder="Business Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="text" id="cac" placeholder="CAC Registration Number">

    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Submit Application</button>

  </form>
</section>
<script>

  const menuToggle =
    document.getElementById("menuToggle");
  
  const navMenu =
    document.getElementById("navMenu");
  
  menuToggle.addEventListener(
    "click",
    () => {
      navMenu.classList.toggle("active");
    }
  );
  
  </script>
<script type="module" src="agent-signup.js"></script>
</body>
</html>
