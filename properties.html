<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties - Anyreals</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->

<header class="navbar">

  <div class="logo">
    Anyreals
  </div>

  <div class="menu-toggle" id="menuToggle">
    ☰
  </div>

  <nav id="navMenu">

    <a href="index.html">Home</a>

    <a href="properties.html">
      Properties
    </a>

    <a href="property-services.html">
      Property Services
    </a>

    <div id="navAuth"></div>

  </nav>

</header>

<section class="section">

  <h2>Browse Properties</h2>

  <!-- FILTER BAR -->
  <div class="filters">

    <input type="text" id="searchInput" placeholder="Search (e.g Lekki duplex)">

    <select id="locationFilter">
      <option value="">All Locations</option>
      <option>Lekki</option>
      <option>Abuja</option>
      <option>Ibadan</option>
    </select>

    <select id="typeFilter">
      <option value="">All Types</option>
      <option>Apartment</option>
      <option>House</option>
      <option>Land</option>
    </select>

    <select id="priceFilter">
      <option value="">All Prices</option>
      <option value="low">Below ₦5M</option>
      <option value="mid">₦5M - ₦20M</option>
      <option value="high">Above ₦20M</option>
    </select>

    <select id="sortFilter">
      <option value="newest">Newest</option>
      <option value="low-high">Price Low → High</option>
      <option value="high-low">Price High → Low</option>
    </select>

    <label>
      <input type="checkbox" id="verifiedOnly"> Verified Only
    </label>

  </div>

  <!-- GRID -->
  <div class="property-grid" id="propertyGrid"></div>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination"></div>

  

</section>

<script>

  const menuToggle =
    document.getElementById("menuToggle");
  
  const navMenu =
    document.getElementById("navMenu");
  
  menuToggle.addEventListener(
    "click",
    () => {
      navMenu.classList.toggle("active");
    }
  );
  
  </script>

<script type="module" src="properties.js"></script>
<script type="module" src="navbar.js"></script>


</body>
</html>
