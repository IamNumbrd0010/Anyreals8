<!-- ACTIONS -->

<section class="dashboard-actions">

  <button onclick="openUploadModal()">
    + Add Property
  </button>

</section>

<!-- AGENT PROPERTIES -->

<section class="section">

  <h2>Your Listings</h2>

  <div
    class="admin-properties-grid"
    id="agentProperties"
  ></div>

</section>

<!-- UPLOAD PROPERTY MODAL -->

<div
  class="modal"
  id="uploadModal"
>

  <div class="modal-content">

    <span
      class="close"
      onclick="closeUploadModal()"
    >
      ×
    </span>

    <h2>Add Property</h2>

    <input
      type="text"
      id="propertyTitle"
      placeholder="Property Title"
    >

    <input
      type="number"
      id="propertyPrice"
      placeholder="Price"
    >

    <input
      type="text"
      id="propertyLocation"
      placeholder="Location"
    >

    <input
      type="text"
      id="propertyAddress"
      placeholder="Address"
    >

    <select id="propertyType">

      <option value="House">
        House
      </option>

      <option value="Apartment">
        Apartment
      </option>

      <option value="Land">
        Land
      </option>

    </select>

    <label>Main Image</label>

    <input
      type="file"
      id="propertyMainImage"
    >

    <label>Gallery Images</label>

    <input
      type="file"
      id="propertyGallery"
      multiple
    >

    <textarea
      id="propertyShortDescription"
      placeholder="Short Description"
    ></textarea>

    <textarea
      id="propertyFullDescription"
      placeholder="Full Description"
    ></textarea>

    <button
      onclick="submitProperty()"
    >
      Submit Property
    </button>

  </div>

</div>

<!-- EDIT MODAL -->

<div
  class="modal"
  id="editModal"
>

  <div class="modal-content">

    <span
      class="close"
      onclick="closeEditModal()"
    >
      ×
    </span>

    <h2>Edit Property</h2>

    <input
      type="text"
      id="editTitle"
      placeholder="Title"
    >

    <input
      type="number"
      id="editPrice"
      placeholder="Price"
    >

    <input
      type="text"
      id="editLocation"
      placeholder="Location"
    >

    <textarea
      id="editDescription"
      placeholder="Description"
    ></textarea>

    <label>
      Replace Main Image
    </label>

    <input
      type="file"
      id="editMainImage"
    >

    <img
      id="editMainPreview"
      class="edit-main-preview"
    >

    <label>
      Add Gallery Images
    </label>

    <input
      type="file"
      id="editGalleryImages"
      multiple
    >

    <div
      id="editGalleryPreview"
      class="edit-gallery-preview"
    ></div>

    <button
      onclick="savePropertyChanges()"
    >
      Save Changes
    </button>

  </div>

</div>

<script>

  const menuToggle =
    document.getElementById("menuToggle");
  
  const navMenu =
    document.getElementById("navMenu");
  
  menuToggle.addEventListener(
    "click",
    () => {
      navMenu.classList.toggle("active");
    }
  );
  
  </script>
